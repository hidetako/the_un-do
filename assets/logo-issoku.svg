<svg width="680" height="360" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>一息（Issoku）ロゴ</title>
<desc>円相（開いた一円相）を一本の息／煙が通り抜ける、一息のロゴ。円＝空・世界、煙＝ひと息。墨色は #141414（暗背景用に #f2ede2 へ差し替え可）。</desc>
<g transform="rotate(-42 340 120)"><circle cx="340" cy="120" r="68" fill="none" stroke="#141414" stroke-width="10" stroke-linecap="round" stroke-dasharray="372 68"/></g>
