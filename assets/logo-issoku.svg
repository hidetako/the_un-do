<circle cx="340" cy="198" r="3.4" fill="#e0631f"/>
<text x="340" y="274" text-anchor="middle" font-family="'Yuji Boku','Yu Mincho','Hiragino Mincho ProN','MS Mincho',serif" font-size="60" fill="#141414">一息</text>
<text x="340" y="306" text-anchor="middle" font-family="sans-serif" font-size="15" letter-spacing="3" fill="#6b6358">ISSOKU · one breath</text>
