<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;width:300px;height:300px;background:transparent}
  .w{width:300px;height:300px;display:flex;align-items:center;justify-content:center}
  /* 動画に重なるので、明暗どちらの場面でも沈まないよう淡い影を付ける */
  svg{filter:drop-shadow(0 0 3px rgba(0,0,0,.55)) drop-shadow(0 0 1px rgba(0,0,0,.45))}
</style></head><body>
<div class="w">
  <svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    <!-- 円相（毛筆・切れ目を下） -->
    <path id="enso" fill="#f2ede2"/>
  </svg>
</div>
<script>
function ribbon(pts,hws){const n=pts.length,L=[],R=[];
  for(let i=0;i<n;i++){const a=pts[Math.min(n-1,i+1)],b=pts[Math.max(0,i-1)];
    const dx=a[0]-b[0],dy=a[1]-b[1],l=Math.hypot(dx,dy)||1,nx=-(dy/l),ny=(dx/l);
    L.push([pts[i][0]+nx*hws[i],pts[i][1]+ny*hws[i]]);R.push([pts[i][0]-nx*hws[i],pts[i][1]-ny*hws[i]]);}
  let d='M'+L[0][0].toFixed(2)+','+L[0][1].toFixed(2);
  for(let i=1;i<n;i++)d+='L'+L[i][0].toFixed(2)+','+L[i][1].toFixed(2);
  for(let i=n-1;i>=0;i--)d+='L'+R[i][0].toFixed(2)+','+R[i][1].toFixed(2);return d+'Z';}
function enso(cx,cy,Rr,gapC,gapD,hwMax){const N=170,a0=gapC+gapD/2,a1=gapC+360-gapD/2,o=[],ip=[];
  for(let i=0;i<=N;i++){const s=i/N,ang=(a0+(a1-a0)*s)*Math.PI/180;
    const f=(0.22+0.78*Math.sin(Math.PI*Math.pow(s,0.72)))*(1-0.82*Math.pow(s,4));
    const hw=Math.max(0.6,hwMax*f),ca=Math.cos(ang),sa=Math.sin(ang);
    o.push([cx+(Rr+hw)*ca,cy+(Rr+hw)*sa]);ip.push([cx+(Rr-hw)*ca,cy+(Rr-hw)*sa]);}
  let d='M'+o[0][0].toFixed(2)+','+o[0][1].toFixed(2);
  for(let i=1;i<o.length;i++)d+='L'+o[i][0].toFixed(2)+','+o[i][1].toFixed(2);
  for(let i=ip.length-1;i>=0;i--)d+='L'+ip[i][0].toFixed(2)+','+ip[i][1].toFixed(2);return d+'Z';}
document.getElementById('enso').setAttribute('d', enso(150,146,100,90,54,17));
</script>
</body></html>
