<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;width:2560px;height:1440px;overflow:hidden}
  .b{width:2560px;height:1440px;position:relative;
     background:radial-gradient(120% 135% at 50% 30%, #2e2519 0%, #181410 52%, #0c0905 100%);
     font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif CJK JP',serif; overflow:hidden}
  .moon{position:absolute; top:566px; left:2040px; width:214px; height:214px}
  .moon svg{width:100%;height:100%;filter:drop-shadow(0 0 22px rgba(244,238,218,.4)) drop-shadow(0 0 52px rgba(244,238,218,.16))}
  .cloud{position:absolute; border-radius:50%; filter:blur(10px);
    background:radial-gradient(ellipse at center, rgba(206,212,222,.2), rgba(206,212,222,.07) 55%, transparent 75%)}
  .cl1{width:420px;height:104px;left:1960px;top:690px}
  .safe{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:1235px; height:338px; display:flex; align-items:center; justify-content:center; gap:60px}
  .mark{position:relative;width:228px;height:228px;flex:0 0 auto}
  .mark img.enso{position:absolute;left:34px;top:32px;width:160px;height:159px}
  .mark img.seal-koun{position:absolute;left:182px;top:-8px;width:46px;height:auto}
  .mark img.seal-go{position:absolute;left:2px;top:170px;width:22px;height:auto}
  .txt{display:flex;flex-direction:column;justify-content:center}
  img.title{width:408px;height:auto;display:block}
  .lat2{color:#d8cdb6; font-size:40px; letter-spacing:.24em; margin-top:12px; padding-left:.26em}
  .s{color:#c2a35e; font-size:28px; letter-spacing:.14em; margin-top:22px; padding-left:.16em}
  .u{color:#e8c87a; font-size:30px; letter-spacing:.12em; margin-top:15px; padding-left:.16em}
</style></head><body>
<div class="b">
  <div class="cloud cl1"></div>
  <div class="moon">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs><mask id="cr"><rect width="100" height="100" fill="#000"/><circle cx="50" cy="52" r="33" fill="#fff"/><circle cx="63" cy="45" r="30" fill="#000"/></mask></defs>
      <circle cx="50" cy="52" r="33" fill="#f4eeda" mask="url(#cr)"/>
    </svg>
  </div>
  <div class="safe">
    <div class="mark">
      <img class="enso" src="./enso-light.png">
      <img class="seal-koun" src="./seal-koun.png" alt="行雲流水">
      <img class="seal-go" src="./seal-go.png" alt="豪">
    </div>
    <div class="txt">
      <img class="title" src="./seiundou-light.png">
      <div class="lat2">THE&nbsp;UN-DO</div>
      <div class="s">一息 ISSOKU ｜ 24時間ひらく、世界の坐禅堂</div>
      <div class="u">the-un-do.vercel.app</div>
    </div>
  </div>
</div>
</body></html>
