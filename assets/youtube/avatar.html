<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;width:800px;height:800px;overflow:hidden}
  .a{width:800px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;
     background:radial-gradient(120% 95% at 50% 40%, #2c2319 0%, #181410 56%, #0e0b07 100%);
     font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif CJK JP',serif}
  .stage{position:relative;width:286px;height:286px}
  .stage>*{position:absolute}
  /* 本物の円相（淡色・落款なし） */
  .stage img.enso{left:17px;top:15px;width:252px;height:251px}
  /* 篆刻：行雲流水（円相の右上）・豪（朱印の位置） */
  .stage img.seal-koun{left:198px; top:0px; width:66px; height:auto}
  .stage img.seal-go{left:192px; top:194px; width:48px; height:auto}
  /* 本物の筆文字「一息」（淡色） */
  img.issoku{width:392px;height:auto;margin-top:26px;display:block}
  .sub{color:#c2a35e;font-size:25px;letter-spacing:.62em;margin-top:14px;padding-left:.62em}
</style></head><body>
<div class="a">
  <div class="stage">
    <img class="enso" src="./enso-light.png">
    <img class="seal-koun" src="./seal-koun.png" alt="行雲流水">
    <img class="seal-go" src="./seal-go.png" alt="豪">
  </div>
  <img class="issoku" src="./issoku-light.png">
  <div class="sub">ISSOKU</div>
</div>
</body></html>
